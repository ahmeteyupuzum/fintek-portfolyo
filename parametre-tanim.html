            "Risk Tasfiye ve Tahsil Müdürlüğü 2-3-4": ["RİSK TASFİYE VE TAHSİL MÜDÜRÜ", "RİSK TASFİYE VE TAHSİL MÜDÜRLÜĞÜ 2 YÖNETİCİSİ", "RİSK TASFİYE VE TAHSİL MÜDÜRLÜĞÜ 2 YETKİLİSİ"],
            "Hukuk İşleri İzleme ve Değerlendirme Müdürlüğü": ["HUKUK İŞLERİ İZLEME VE DEĞERLENDİRME MÜDÜRLÜĞÜ YÖNETİCİSİ", "HUKUK İŞLERİ İZLEME VE DEĞERLENDİRME MÜDÜRLÜĞÜ DANIŞMANI", "HUKUK İŞLERİ İZLEME VE DEĞERLENDİRME MÜDÜRLÜĞÜ YETKİLİSİ", "HUKUK İŞLERİ İZLEME VE DEĞERLENDİRME MÜDÜRLÜĞÜ MÜDÜRÜ", "HUKUK İŞLERİ İZLEME VE DEĞERLENDİRME MÜDÜRLÜĞÜ AVUKATI"],
            "Sözleşmeli Hukuk Büroları": ["SÖZLEŞMELİ HUKUK BÜROSU KATİP", "SÖZLEŞMELİ HUKUK BÜROSU OPERASYON GÖREVLİSİ", "SÖZLEŞMELİ AVUKAT", "SÖZLEŞMELİ BİRİM SORUMLUSU", "SÖZLEŞMELİ HUKUK BÜROSU PROJE KATİBİ", "SÖZLEŞMELİ HUKUK BÜROSU PROJE OPERASYON GÖREVLİSİ", "SÖZLEŞMELİ PROJE AVUKATI", "SÖZLEŞMELİ PROJE SORUMLUSU"]
        };

        // --- STATE VE CONFIG ---
        let currentMode = 'taksit'; 
        let tableData = { taksit: [], faiz: [] };

        const COLUMNS = {
            taksit: ["Id", "Ödeme Plan İndirim Tanım", "Dosya Birim Tipi", "Kullanıcı Birim Tipi", "Kullanıcı Rol Tanımı", "Müşteri Min. Asıl Alacak", "Müşteri Maks. Asıl Alacak", "Min. Taksit Sayısı", "Maks. Taksit Sayısı", "Varsayılan Taksit Sayısı", "İlk Taksit Gün Fark Sayısı", "Maks. Taksit Erteleme Gün Sayısı", "İlk Taksit Peşinat Alınsın", "Çift Sicil Onayı Var"],
            faiz: ["Id", "Ödeme Plan İndirim Tanım", "Dosya Birim Tipi", "Kullanıcı Birim Tipi", "Kullanıcı Rol Tanımı", "Müşteri Min. Asıl Alacak", "Müşteri Maks. Asıl Alacak", "Teminat Durumu", "Minimum Faiz Oranı"]
        };

        // --- INIT ---
        window.onload = function() {
            renderMultiSelects();
            renderTable();
        };

        // --- CUSTOM MULTI-SELECT FUNCTIONS ---

        function normalizeTR(text) {
            return text.replace(/İ/g, "i").replace(/I/g, "ı").toLowerCase()
                       .replace(/ı/g, "i")
                       .replace(/ğ/g, "g")
                       .replace(/ü/g, "u")
                       .replace(/ş/g, "s")
                       .replace(/ö/g, "o")
                       .replace(/ç/g, "c");
        }

        function createCheckboxItem(value, label, containerId, extraData = null) {
            const div = document.createElement('div');
            div.className = 'checkbox-item flex items-start p-2 cursor-pointer transition-colors border-b border-gray-100 last:border-0';
            
            // Checkbox
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = value;
            checkbox.className = 'mt-1 mr-3 h-4 w-4 text-bankBlue-600 border-gray-300 rounded focus:ring-bankBlue-500';
            
            // Veri taşıma (Roller için parent birim bilgisi lazım)
            if(extraData) {
                Object.keys(extraData).forEach(key => {
                    checkbox.dataset[key] = extraData[key];
                });
            }

            // Olaylar
            if(containerId === 'kullaniciBirimListContainer') {
                checkbox.onchange = updateRolesFromCheckbox;
            }

            // Label Text
            const textDiv = document.createElement('div');
            textDiv.className = 'text-sm text-gray-700 leading-snug select-none';
            textDiv.innerText = label;

            // Tıklama ile checkbox tetikleme
            div.onclick = (e) => {
                if (e.target !== checkbox) {
                    checkbox.checked = !checkbox.checked;
                    // Manuel tetikleme (onchange)
                    if(checkbox.onchange) checkbox.onchange();
                }
            };

            div.appendChild(checkbox);
            div.appendChild(textDiv);
            return div;
        }

        function renderMultiSelects() {
            // 1. Planlar
            const planContainer = document.getElementById('planListContainer');
            planContainer.innerHTML = '';
            PLAN_TYPES.forEach(p => {
                planContainer.appendChild(createCheckboxItem(p, p, 'planListContainer'));
            });

            // 2. Dosya Birim
            const dosyaContainer = document.getElementById('dosyaListContainer');
            dosyaContainer.innerHTML = '';
            DOSYA_BIRIMLERI.forEach(d => {
                dosyaContainer.appendChild(createCheckboxItem(d, d, 'dosyaListContainer'));
            });

            // 3. Kullanıcı Birim
            const userContainer = document.getElementById('kullaniciBirimListContainer');
            userContainer.innerHTML = '';
            Object.keys(ROLES_MAP).forEach(k => {
                userContainer.appendChild(createCheckboxItem(k, k, 'kullaniciBirimListContainer'));
            });
        }

        function updateRolesFromCheckbox() {
            // Kullanıcı Birim checkboxlarına her basıldığında burası çalışır
            const userContainer = document.getElementById('kullaniciBirimListContainer');
            const roleContainer = document.getElementById('rolListContainer');
            
            // Seçili birimleri bul
            const selectedUnits = Array.from(userContainer.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);

            roleContainer.innerHTML = ''; // Temizle

            if(selectedUnits.length === 0) {
                roleContainer.innerHTML = '<div class="p-4 text-center text-gray-400 italic text-sm">Önce Kullanıcı Birim Tipi seçiniz...</div>';
                return;
            }

            selectedUnits.forEach(unit => {
                if(ROLES_MAP[unit]) {
                    // Grup başlığı (Opsiyonel görsel ayraç)
                    const groupHeader = document.createElement('div');
                    groupHeader.className = 'bg-gray-200 px-2 py-1 text-xs font-bold text-gray-600 uppercase tracking-wide';
                    groupHeader.innerText = unit;
                    roleContainer.appendChild(groupHeader);

                    ROLES_MAP[unit].forEach(role => {
                        // Dataset unit ekliyoruz ki sonra hangi birime ait olduğunu bilelim
                        roleContainer.appendChild(createCheckboxItem(role, role, 'rolListContainer', {unit: unit}));
                    });
                }
            });
        }

        function filterList(input, containerId) {
            const filter = normalizeTR(input.value);
            const container = document.getElementById(containerId);
            const items = container.getElementsByClassName('checkbox-item');

            for (let i = 0; i < items.length; i++) {
                const textDiv = items[i].getElementsByTagName('div')[0];
                const txtValue = normalizeTR(textDiv.textContent || textDiv.innerText);
                if (txtValue.indexOf(filter) > -1) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        function selectAll(containerId, isSelect) {
            const container = document.getElementById(containerId);
            // Sadece görünür olanları seç (filtre varsa hepsi seçilmesin, sadece arananlar seçilsin)
            const items = container.querySelectorAll('.checkbox-item');
            
            items.forEach(item => {
                if(item.style.display !== 'none') {
                    const cb = item.querySelector('input[type="checkbox"]');
                    cb.checked = isSelect;
                    if(cb.onchange) cb.onchange(); // Trigger event (özellikle kullanıcı birim için önemli)
                }
            });
        }

        function removeManagers() {
            const container = document.getElementById('rolListContainer');
            const checkboxes = container.querySelectorAll('input[type="checkbox"]:checked');
            let count = 0;
            checkboxes.forEach(cb => {
                const val = normalizeTR(cb.value);
                // "müdür" veya "yönetici" geçenleri çıkar
                if(val.includes('muduru')) {
                    cb.checked = false;
                    count++;
                }
            });
            // Ufak bir bildirim (opsiyonel)
            if(count > 0) {
                // alert(count + " adet Müdür/Yönetici rolü seçimden çıkarıldı.");
            }
        }

        function getSelectedValuesFromContainer(containerId) {
            const container = document.getElementById(containerId);
            const checkedBoxes = container.querySelectorAll('input[type="checkbox"]:checked');
            return Array.from(checkedBoxes).map(cb => ({
                value: cb.value,
                dataset: cb.dataset // Rollerde parent unit lazım olabilir
            }));
        }

        // --- CORE LOGIC ---
        function uuidv4() {
            return "1000" + Math.floor(Math.random() * 9000); 
        }

        function addEntries() {
            // 1. Get Selections
            const plans = getSelectedValuesFromContainer('planListContainer').map(x => x.value);
            const fileUnits = getSelectedValuesFromContainer('dosyaListContainer').map(x => x.value);
            const roleObjects = getSelectedValuesFromContainer('rolListContainer'); // Contains value & dataset.unit
            
            if(plans.length === 0 || fileUnits.length === 0 || roleObjects.length === 0) {
                alert("Lütfen tüm zorunlu alanlardan (Plan, Dosya Birim, Kullanıcı Birim/Rol) en az bir seçim yapınız.");
                return;
            }

            // 2. Get Common Inputs
            const minAlc = document.getElementById('minAlacak').value;
            const maxAlc = document.getElementById('maxAlacak').value;

            // 3. Mode Specific Inputs
            let rowBase = {};
            if(currentMode === 'taksit') {
                rowBase = {
                    minTaksit: document.getElementById('minTaksit').value,
                    maxTaksit: document.getElementById('maxTaksit').value,
                    defTaksit: document.getElementById('defTaksit').value,
                    gunFark: document.getElementById('gunFark').value,
                    erteleme: document.getElementById('ertelemeGun').value,
                    pesinat: document.getElementById('pesinat').value,
                    ciftSicil: document.getElementById('ciftSicil').value,
                };
            } else {
                rowBase = {
                    teminat: document.getElementById('teminatDurumu').value,
                    minFaiz: document.getElementById('minFaiz').value
                };
            }

            // 4. Cartesian Product Generation
            let newRows = [];

            // Iterate Plans
            plans.forEach(plan => {
                // Iterate File Units
                fileUnits.forEach(fUnit => {
                    // Iterate Selected Roles
                    roleObjects.forEach(roleObj => {
                        const roleName = roleObj.value;
                        const uUnit = roleObj.dataset.unit; // Checkbox oluştururken eklemiştik

                        const id = uuidv4();

                        let row = {};
                        if(currentMode === 'taksit') {
                            row = {
                                "Id": id,
                                "Ödeme Plan İndirim Tanım": plan,
                                "Dosya Birim Tipi": fUnit,
                                "Kullanıcı Birim Tipi": uUnit,
                                "Kullanıcı Rol Tanımı": roleName,
                                "Müşteri Min. Asıl Alacak": parseInt(minAlc),
                                "Müşteri Maks. Asıl Alacak": parseInt(maxAlc),
                                "Min. Taksit Sayısı": parseInt(rowBase.minTaksit),
                                "Maks. Taksit Sayısı": parseInt(rowBase.maxTaksit),
                                "Varsayılan Taksit Sayısı": parseInt(rowBase.defTaksit),
                                "İlk Taksit Gün Fark Sayısı": parseInt(rowBase.gunFark),
                                "Maks. Taksit Erteleme Gün Sayısı": parseInt(rowBase.erteleme),
                                "İlk Taksit Peşinat Alınsın": rowBase.pesinat,
                                "Çift Sicil Onayı Var": rowBase.ciftSicil
                            };
                        } else {
                            row = {
                                "Id": id,
                                "Ödeme Plan İndirim Tanım": plan,
                                "Dosya Birim Tipi": fUnit,
                                "Kullanıcı Birim Tipi": uUnit,
                                "Kullanıcı Rol Tanımı": roleName,
                                "Müşteri Min. Asıl Alacak": parseInt(minAlc),
                                "Müşteri Maks. Asıl Alacak": parseInt(maxAlc),
                                "Teminat Durumu": rowBase.teminat,
                                "Minimum Faiz Oranı": parseFloat(rowBase.minFaiz)
                            };
                        }
                        newRows.push(row);
                    });
                });
            });

            // Add to state
            tableData[currentMode].push(...newRows);
            renderTable();
            
            // Feedback Animation
            const btn = document.querySelector('button[onclick="addEntries()"]');
            const originalHTML = btn.innerHTML;
            const originalClass = btn.className;
            btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> ${newRows.length} Eklendi`;
            btn.className = "px-6 py-2 bg-green-600 text-white rounded-md shadow-md flex items-center transition-all";
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.className = originalClass;
            }, 1500);
        }

        function deleteRow(index) {
            tableData[currentMode].splice(index, 1);
            renderTable();
        }

        function clearTable() {
            if(confirm("Tüm liste silinecek. Emin misiniz?")) {
                tableData[currentMode] = [];
                renderTable();
            }
        }
        
        function clearForm() {
            document.getElementById('paramForm').reset();
            // Checkboxları temizle
            selectAll('planListContainer', false);
            selectAll('dosyaListContainer', false);
            selectAll('kullaniciBirimListContainer', false);
            // Rolleri temizle (trigger ile)
            updateRolesFromCheckbox();
        }

        function switchTab(mode) {
            currentMode = mode;
            // UI Toggle
            document.getElementById('tab-taksit').className = mode === 'taksit' ? 'tab-active pb-4 px-2 text-lg transition-colors duration-200' : 'tab-inactive pb-4 px-2 text-lg transition-colors duration-200';
            document.getElementById('tab-faiz').className = mode === 'faiz' ? 'tab-active pb-4 px-2 text-lg transition-colors duration-200' : 'tab-inactive pb-4 px-2 text-lg transition-colors duration-200';

            // Show/Hide Fields
            const taksitFields = document.querySelectorAll('.taksit-field');
            const faizFields = document.querySelectorAll('.faiz-field');

            if(mode === 'taksit') {
                taksitFields.forEach(el => el.classList.remove('hidden'));
                faizFields.forEach(el => el.classList.add('hidden'));
            } else {
                taksitFields.forEach(el => el.classList.add('hidden'));
                faizFields.forEach(el => el.classList.remove('hidden'));
            }
            renderTable();
        }

        function renderTable() {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            const countSpan = document.getElementById('rowCount');
            
            const data = tableData[currentMode];
            const cols = COLUMNS[currentMode];

            countSpan.innerText = `${data.length} Satır`;

            // Headers
            let hHtml = '';
            cols.forEach(c => hHtml += `<th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-b whitespace-nowrap">${c}</th>`);
            hHtml += `<th class="px-3 py-3 border-b bg-gray-50 sticky right-0"></th>`; // Actions
            thead.innerHTML = hHtml;

            // Body
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="100%" class="px-6 py-8 text-center text-gray-400 italic">Liste boş. Yukarıdan seçim yapıp "Listeye Ekle" butonuna basınız.</td></tr>`;
                return;
            }

            let bHtml = '';
            data.forEach((row, idx) => {
                bHtml += `<tr class="hover:bg-blue-50 transition-colors group">`;
                cols.forEach(key => {
                    bHtml += `<td class="px-3 py-2 text-gray-700 border-b border-gray-100 min-w-[100px] max-w-[300px] truncate" title="${row[key]}">${row[key]}</td>`;
                });
                bHtml += `<td class="px-3 py-2 border-b border-gray-100 text-right sticky right-0 bg-white group-hover:bg-blue-50 shadow-[-5px_0px_5px_-5px_rgba(0,0,0,0.1)]">
                    <button onclick="deleteRow(${idx})" class="text-red-400 hover:text-red-700 p-1"><i class="fa-solid fa-trash"></i></button>
                </td></tr>`;
            });
            tbody.innerHTML = bHtml;
        }

        function exportToExcel() {
            const data = tableData[currentMode];
            if(data.length === 0) {
                alert("İndirilecek veri yok.");
                return;
            }

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(data);

            const wscols = COLUMNS[currentMode].map(c => ({wch: c.length + 5}));
            ws['!cols'] = wscols;

            XLSX.utils.book_append_sheet(wb, ws, "Parametreler");

            const fileName = currentMode === 'taksit' 
                ? "ÖDEME PLANI TAKSİT PARAMETRE.xlsx" 
                : "ÖDEME PLAN FAİZ PARAMETRE.xlsx";

            XLSX.writeFile(wb, fileName);
        }

    </script>
</body>
